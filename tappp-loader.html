<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAPPP — Loader Concepts</title>
<style>
* { -webkit-box-sizing:border-box; box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; background:#0d0f1a; }
body {
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-box-orient:vertical; -webkit-box-direction:normal;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-box-align:center; -webkit-align-items:center; align-items:center;
  -webkit-box-pack:center; -webkit-justify-content:center; justify-content:center;
  min-height:100%;
}
.loader-wrap {
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-box-orient:vertical; -webkit-box-direction:normal;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-box-align:center; -webkit-align-items:center; align-items:center;
}
.ver { display:none; }
.ver.on { display:block; }
.label {
  display:block; margin-top:28px;
  color:#505878; font-size:11px; letter-spacing:.14em;
  text-transform:uppercase; font-weight:500;
  font-family:Arial,Helvetica,sans-serif;
}
.switchers { margin-top:52px; text-align:center; }
.group { margin-bottom:14px; }
.sel-label {
  color:#404666; font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; font-family:Arial,sans-serif;
  margin-bottom:8px;
}
.btn {
  display:inline-block; margin:0 4px;
  padding:7px 18px; background:transparent;
  border:1px solid #272c47; border-radius:8px;
  color:#505878; font-size:12px;
  font-family:Arial,Helvetica,sans-serif;
  letter-spacing:.04em; cursor:pointer;
}
.btn.on { border-color:#5468ff; color:#6b7fff; }

/* CSS animations (modern) */
.ga1 { fill:none; stroke:white; stroke-width:.62;  stroke-dasharray:23.8; stroke-dashoffset:23.8; }
.ga2 { fill:none; stroke:white; stroke-width:2.03; stroke-dasharray:19.7; stroke-dashoffset:19.7; }
.ga3 { fill:none; stroke:white; stroke-width:4.17; stroke-dasharray:13.1; stroke-dashoffset:13.1; }
@keyframes f1 {
  0%{stroke-dashoffset:23.8} 16.67%{stroke-dashoffset:0}
  50%{stroke-dashoffset:0} 66.67%{stroke-dashoffset:-23.8}
  66.68%{stroke-dashoffset:23.8} 100%{stroke-dashoffset:23.8}
}
@keyframes f2 {
  0%,16.67%{stroke-dashoffset:19.7} 33.33%{stroke-dashoffset:0}
  66.67%{stroke-dashoffset:0} 83.33%{stroke-dashoffset:-19.7}
  83.34%{stroke-dashoffset:19.7} 100%{stroke-dashoffset:19.7}
}
@keyframes f3 {
  0%,33.33%{stroke-dashoffset:13.1} 50%{stroke-dashoffset:0}
  83.33%{stroke-dashoffset:0} 100%{stroke-dashoffset:-13.1}
}
.am1 { -webkit-animation:f1 4.2s ease-in-out infinite; animation:f1 4.2s ease-in-out infinite; }
.am2 { -webkit-animation:f2 4.2s ease-in-out infinite; animation:f2 4.2s ease-in-out infinite; }
.am3 { -webkit-animation:f3 4.2s ease-in-out infinite; animation:f3 4.2s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:.35} 50%{opacity:1} }
.breathe { -webkit-animation:breathe 2.5s ease-in-out infinite; animation:breathe 2.5s ease-in-out infinite; }
</style>
</head>

<!-- ════ CONTROLS ════ -->
<div class="switchers">
  <div class="group">
    <p class="sel-label">Variant</p>
    <div class="selector">
      <button id="btn-v-isotipo"  class="btn"    onclick="setVariant('isotipo')">Isotipo</button>
      <button id="btn-v-logo"     class="btn"    onclick="setVariant('logo')">Logo</button>
      <button id="btn-v-isologo"  class="btn on" onclick="setVariant('isologo')">Isologo</button>
    </div>
  </div>
  <div class="group">
    <p class="sel-label">Technology</p>
    <div class="selector">
      <button id="btn-t-modern" class="btn on" onclick="setTech('modern')">Modern</button>
      <button id="btn-t-tv"     class="btn"    onclick="setTech('tv')">TV / Old Chromium</button>
    </div>
  </div>
</div>

<script>
var cv = 'isologo', ct = 'modern';
var variants = ['isotipo','logo','isologo'];
var techs    = ['modern','tv'];

function setVariant(v) { cv = v; render(); }
function setTech(t)    { ct = t; render(); }

function render() {
  variants.forEach(function(v) {
    techs.forEach(function(t) {
      var el = document.getElementById('ver-' + v + '-' + t);
      el.className = 'ver' + (v === cv && t === ct ? ' on' : '');
    });
    document.getElementById('btn-v-' + v).className = 'btn' + (v === cv ? ' on' : '');
  });
  techs.forEach(function(t) {
    document.getElementById('btn-t-' + t).className = 'btn' + (t === ct ? ' on' : '');
  });
}
</script>
